<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-BASICS</title>
</head>
<body>
    <h2>NESTED CONDITIONS</h2>

    <script>
        var a = 119;

        if(a < 200){
            if(a % 2 == 0){
                document.write(`<h3>Nested Condition is True</h3>`)
            }else {
                document.write(`<h3>Nested Condition is False</h3>`)
            }
        }else{
            document.write(`<h3>Primary Condition is False</h3>`)
        }
    </script>
</body>
</html>
