<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-BASICS</title>
</head>
<body>
    <h2>With Parameter, with Return value</h2>

    <script>
        function paraReturn(firstName, lastName){
            
            let sum= firstName+lastName;
            return sum;
            
        }
        document.write(`<p>SUM = ${paraReturn(10,20)}</p>`)
    </script>
</body>
</html>
