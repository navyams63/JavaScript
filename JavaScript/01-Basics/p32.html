<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-BASICS</title>
</head>
<body>
    <h3>NAN -> Not A Number</h3>

    <script>
        var a = "123a"

        document.write(`<h3> ${a}</h3>`)
        document.write(`<h3> ${Number(a)} </h3>`)  //NAN
        document.write(`<h3> ${ parseInt(a)}</h3>`)

        document.write(`<h3> ${ isNAN(124)}</h3>`)  //false
        document.write(`<h3> ${a}</h3>`)
        document.write(`<h3> ${a}</h3>`)
        document.write(`<h3> ${a}</h3>`)

    </script>
</body>
</html>
