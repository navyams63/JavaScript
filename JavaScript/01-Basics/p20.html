<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-BASICS</title>
</head>
<body>
    <h2>Without parameter, with Return value</h2>

    <script>
        function addFunction(){
            let firstNum=10, secondNum=20, sum;
            sum=firstNum + secondNum;
            
            document.write(`<p><b>SUM</b> = ${sum} </p>`)
            return sum;
        }
        document.write(`<strong>Without parameter, with Return value : ${addFunction()}</strong>`)
        // addFunction();
    </script>
</body>
</html>
