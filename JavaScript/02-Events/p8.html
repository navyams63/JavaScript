<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-EVENT</title>
</head>
<body>
    <center>
        <h1>Media Events</h1>
    </center>

    <h3 id="msg"></h3>

    <video src="assets/media/sea_-_4006 (360p).mp4" height="200" controls onplay="playHan()" onpause="pauseHan()" onvolumechange="volHan()" onseeking="seeHan"></video>

    <script>
        var msg = document.getElementById("msg")

        function playHan(){
            msg.innerHTML = "Started playing Video"
            msg.style.color = "green"
        }

        function pauseHan(){
            msg.innerHTML = "video paused"
            msg.style.color = "deepskyblue"
        }
        function volHan(){
            msg.innerHTML = "Volume changed"
            msg.style.color = "yellow"
        }
        function seeHan(){
            msg.innerHTML = "Video time changing"
            msg.style.color = "blue"
        }
    </script>
</body>
</html>
