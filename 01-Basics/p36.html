<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-BASICS</title>
</head>
<body>
    <h3>Arrays</h3>

    <!-- 
        Array -> is a group of values of similar types
        1. Literal type (single)
            a. array literal
            b. array using constructor
            c. array as constructor parameter
        2. Object Array
        3. JSON(JavaScript Onject )
     -->

     <script>
        //array literal
        var num = [12,2,33,44,56,58];  /* NUmbers */
        var user = ['ram', 'venu', 'somu', 'nanda']; /* strings*/ 
        var arr = [true, 123, "admin@gmail.com", 123.345];  /* mix type*/

        document.write(`<h3> ${ arr[0]}</h3>`) // arrName[index]
        document.write(`<h3>${arr}</h3>`)
        document.write(`<h3> ${ user[2]} </h3>`)
        document.write(`<h3> ${ user } </h3>`)
        document.write(`<h3> ${ num[4]} </h3>`)
        document.write(`<h3> ${ num} </h3>`)

        for(i=0; i<user.length; i++){
            document.write(`<h3> style= 'color:orangered;' ${ user[i]}</h3>`)
        }
     </script>
</body>
</html>
