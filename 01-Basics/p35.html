<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS-BASICS</title>
</head>
<body>
    <center>
        <h1>Type Conversion Using Operators </h1>
    </center>

    <script>
        let x1 = "10"
        let y1 = +x1
        alert(typeof(y1))  //Output:Number
        alert(y1)   //Output:10

        let x2 = 10
        let y2 = x2 + "" 
        alert(typeof(y2))  //Otput:string
        alert(y2)  //Output:15

        document.write("3" - 2 + "<br>")  //Output:1
        // console.log("3",-2);
        document.write("3" + 2 +"<br>")  //output: "32" (because + is also concatenation operator)
        document.write(3 + "2" + "<br>")  //output:"32"
        document.write("3" * "2" +"<br>") //output:6
        document.write()

    </script>
</body>
</html>
